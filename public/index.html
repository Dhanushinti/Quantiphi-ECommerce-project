<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace | Multi-Filter Sidebar</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>Filters</h2>

    <div class="filter-group">
      <h3>Category</h3>
      <label class="checkbox-label"><input type="checkbox" class="category-checkbox" value="Electronics"> Electronics</label>
      <label class="checkbox-label"><input type="checkbox" class="category-checkbox" value="Apparel"> Apparel</label>
      <label class="checkbox-label"><input type="checkbox" class="category-checkbox" value="Footwear"> Footwear</label>
      <label class="checkbox-label"><input type="checkbox" class="category-checkbox" value="Accessories"> Accessories</label>
    </div>

    <div class="filter-group">
      <h3>Price Range</h3>
      <div class="price-values">
        <span id="priceMinLabel">₹0</span> – <span id="priceMaxLabel">₹25,000</span>
      </div>
      <div class="slider-track">
        <input type="range" id="priceMin" min="0" max="25000" step="500" value="0">
        <input type="range" id="priceMax" min="0" max="25000" step="500" value="25000">
      </div>
    </div>

    <div class="filter-group">
      <h3>Minimum Rating</h3>
      <label class="radio-label"><input type="radio" name="rating" value="0" checked> Any</label>
      <label class="radio-label"><input type="radio" name="rating" value="1"> ★ 1+</label>
      <label class="radio-label"><input type="radio" name="rating" value="2"> ★★ 2+</label>
      <label class="radio-label"><input type="radio" name="rating" value="3"> ★★★ 3+</label>
      <label class="radio-label"><input type="radio" name="rating" value="4"> ★★★★ 4+</label>
      <label class="radio-label"><input type="radio" name="rating" value="5"> ★★★★★ 5</label>
    </div>
  </aside>

  <main class="content">
    <div class="content-header">
      <span id="resultCount"></span>
      <select id="sortBy">
        <option value="default">Sort By</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="rating-desc">Top Rated First</option>
      </select>
    </div>

    <div id="productGrid" class="product-grid"></div>

    <div id="emptyState" class="empty-state hidden">
      <p>No items match your criteria.</p>
      <button id="resetFilters">Reset filters</button>
    </div>
  </main>
</div>

<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/render.js"></script>
<script src="js/app.js"></script>
</body>
</html>
